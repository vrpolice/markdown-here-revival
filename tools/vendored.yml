---
version: 2
vendor_prefix: vendor

commands:
  copy: $(CP) $< $@
  rollup: >
          ./node_modules/.bin/rollup
          --format es
          --file "$(EXTENSION)/{vendor_prefix}/{node_pkg}.esm.js"
          -p @rollup/plugin-node-resolve
          -p @rollup/plugin-commonjs
          -m inline
          $<
  bash: null

vendored:
  marked:
    path: lib/marked.esm.js
    method: copy

  marked-linkify-it:
    path: src/index.js
    method: rollup

  marked-highlight:
    path: src/index.js
    method: copy

  marked-extended-tables:
    path: src/index.js
    method: bash
    cmds:
      - $(CP) $< $@
      - node ./tools/dos2unix.js $@

  marked-emoji:
    path: src/index.js
    method: copy

  degausser:
    path: src/degausser.js
    method: rollup

  highlightjs:
    path: es/common.js
    method: bash
    vendor_prefix: highlightjs
    node_pkg: highlight.js
    clean: "$(RM) $(EXTENSION)/{vendor_prefix}/highlightjs.esm.js $(EXTENSION)/{vendor_prefix}/styles/*.css"
    cmds:
      - ./node_modules/.bin/rollup --format es \
      - --file "$(EXTENSION)/{vendor_prefix}/highlightjs.esm.js" \
      - -p @rollup/plugin-node-resolve \
      - -p @rollup/plugin-commonjs \
      - $<
      - "node ./tools/highlightjs_styles.js node_modules/{node_pkg}/styles $(EXTENSION)/{vendor_prefix}/styles"

  turndown:
    path: lib/turndown.browser.es.js
    method: copy

  textcomplete:
    paths:
      textcomplete.js: contenteditable/src/index.ts
    method: bash
    node_pkg: '@textcomplete'
    cmds:
      - node tools/bundle-textcomplete.mjs $@

  emoji_codes:
    paths:
      emoji_codes.json: en/shortcodes/github.json
    method: bash
    node_pkg: emojibase-data
    vendor_prefix: data
    clean: $(RM) $(EXTENSION)/data/emoji_codes.json
    cmds:
      - node ./tools/emoji-grab.js $< $@

  dompurify:
    paths:
      purify.es.mjs: dist/purify.es.mjs
    method: copy

  bootstrap:
    paths:
      bootstrap.bundle.js: dist/js/bootstrap.bundle.js
    method: copy

  bootswatch:
    paths:
      bootswatch.css: dist/darkly/bootstrap.css
    method: copy

  texzilla:
    paths:
      TeXZilla.js: TeXZilla.js
    method: bash
    cmds:
      - $(CP) $< $@
      - node ./tools/fileappend.js $@ "export default TeXZilla"

  mailext-options-sync:
    node_pkg: "@jfx2006/mailext-options-sync"
    paths:
      mailext-options-sync.js: index.js
    vendor_prefix: options
    clean: $(RM) $(EXTENSION)/options/mailext-options-sync.js
    method: copy
